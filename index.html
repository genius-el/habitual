<!DOCTYPE htmml>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Habitual</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

            <!-- <header>
                <h1>Habitual</h1>
                <p>Your daily habits, your success.</p>
            </header> -->
        <main>
            <section class="habitGrouping">
                <h1>Habit Grouping</h1>
                <section class="urgentAndImportant">
                    <div>
                        <h2>Urgent and Important</h2>
                    </div>
                    <div>
                        <input type="text" placeholder="Add a habit" id="urgAndImpField">
                        <button id="urgAndImpBtn">Add</button>
                    </div>
                </section>

                <section class="importantNotUrgent">
                    <div>
                        <h2>Important but Not Urgent</h2>
                    </div>
                    <div>
                        <input type="text" placeholder="Add a habit" id="impField">
                        <button id="impBtn">Add</button>
                    </div>
                </section>

                <section class="urgentNotImportant">
                    <div>
                        <h2>Urgent but Not Important</h2>
                    </div>
                    <div>
                        <input type="text" placeholder="Add a habit" id="urgField">
                        <button id="urgBtn">Add</button>
                    </div>
                </section>

                <section class="notUrgentNotImportant">
                    <div>
                        <h2>Not Urgent and Not Important</h2>
                    </div>
                    <div>
                        <input type="text" placeholder="Add a habit" id="nilField">
                        <button id="nilBtn">Add</button>
                    </div>
                </section>
            </section>
        
            <!-- <section class="divider"></section> -->

            <section class="habits-list">
                <h1>Your Habits</h1>
                <ul id="habits"></ul>
            </section>
        </main>
        <!-- </div> -->
    </body>

    <script src="script.js"></script>
</html>
